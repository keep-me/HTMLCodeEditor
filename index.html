<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeEditor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="btn">
      <button id="runBtn">Run</button>
    </div>
    <div class="container">
      <div class="editors">
        <div class="editor-container">
          <div class="editor-header">HTML</div>
          <textarea id="htmlInput" class="editor" placeholder="Enter HTML code here..."></textarea>
        </div>
        <div class="editor-container">
          <div class="editor-header">CSS</div>
          <textarea id="cssInput" class="editor" placeholder="Enter CSS code here..."></textarea>
        </div>
        <div class="editor-container">
          <div class="editor-header">JavaScript</div>
          <textarea id="jsInput" class="editor" placeholder="Enter JavaScript code here..."></textarea>
        </div>
      </div>
      <div class="preview-container">
        <div class="editor-header">Preview</div>
        <iframe id="preview" srcdoc="" frameborder="0" class="output"></iframe>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
